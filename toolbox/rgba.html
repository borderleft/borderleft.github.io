---
layout: tool
title: "RGBA to RGB converter"
---

<h1>{{ page.title }}</h1>

<div class="intro">
  <p>Blend an RGBA foreground over an RGB background to get an opaque RGB/hex value.</p>
</div>

<div class="input">
  <table>
    <tbody>
      <tr>
        <td>RGB background</td>
        <td><input id="bg_colorpicker"></td>
        <td>
          <p>
            <code id="bg_value_hex">N/A</code>
            <code id="bg_value_rgb">N/A</code>
          </p>
        </td>
      </tr>
      <tr>
        <td>RGBA foreground</td>
        <td><input id="rgba_colorpicker"></td>
        <td>
          <p>
            <code id="rgba_value_hex">N/A</code>
            <code id="rgba_value_rgba">N/A</code>
          </p>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div class="output">
  <h2>Output</h2>
  <p>
    <span id="output_color_box"></span>
    <code id="output_value_hex">N/A</code>
    <code id="output_value_rgb">N/A</code>
  </p>

  <table>
    <tr>
      <td>
        <div id="output_rgba_view"><span>RGBA color</span></div>
      </td>
      <td>
        <div id="output_join_view"><span>RGBA foreground on RGB background</span></div>
      </td>
    </tr>
  </table>
</div>

<script src="/assets/lib/jquery-slim.min.js?v=4.0.0"></script>
<script>
  if (!jQuery.isArray) {
    jQuery.isArray = Array.isArray;
  }
</script>
<script src="/assets/lib/spectrum.min.js?v=1.8.1"></script>

<script>
  (function($) {
    function Color(r, g, b, a) {
      this.r = r;
      this.g = g;
      this.b = b;
      this.a = typeof a === 'number' ? a : 1;
    }

    Color.prototype.blend = function(overlay) {
      const alpha = overlay.a;
      return new Color(
        (1 - alpha) * this.r + alpha * overlay.r,
        (1 - alpha) * this.g + alpha * overlay.g,
        (1 - alpha) * this.b + alpha * overlay.b
      );
    };

    function rgb_to_hex(r, g, b) {
      return '#' + [r, g, b]
        .map(c => Math.max(0, Math.min(255, Math.round(c))).toString(16).padStart(2, '0'))
        .join('');
    }

    function get_color(selector) {
      try {
        const color = $(selector).spectrum('get');
        return color || null;
      } catch (err) {
        console.error(`Failed to read color from ${selector}:`, err);
        return null;
      }
    }

    function update_display() {
      const overlay_spec = get_color('#rgba_colorpicker');
      const bg_spec = get_color('#bg_colorpicker');

      if (!overlay_spec || !bg_spec) {
        console.warn('Color pickers not ready; skipping display update.');
        return;
      }

      const overlay = overlay_spec.toRgb();
      const bg = bg_spec.toRgb();

      const overlay_color = new Color(overlay.r, overlay.g, overlay.b, overlay.a);
      const bg_color = new Color(bg.r, bg.g, bg.b);
      const blended = bg_color.blend(overlay_color);
      const blended_rgb = `rgb(${Math.round(blended.r)},${Math.round(blended.g)},${Math.round(blended.b)})`;

      $('#bg_value_hex').text(bg_spec.toHexString());
      $('#bg_value_rgb').text(bg_spec.toRgbString().replace(/\s/g, ''));

      $('#rgba_value_hex').text(overlay_spec.toHexString());
      $('#rgba_value_rgba').text(overlay_spec.toRgbString().replace(/\s/g, ''));

      $('#output_color_box').css('background-color', blended_rgb);
      $('#output_value_hex').text(rgb_to_hex(blended.r, blended.g, blended.b));
      $('#output_value_rgb').text(blended_rgb);

      $('#output_rgba_view').css('background-color', `rgba(${overlay.r},${overlay.g},${overlay.b},${overlay.a})`);
      $('#output_join_view').css('background-color', blended_rgb);
    }

    $('#bg_colorpicker').spectrum({
      color: 'rgb(0,0,0)',
      showAlpha: false,
      preferredFormat: 'rgb',
      showInput: true,
      change: update_display
    });

    $('#rgba_colorpicker').spectrum({
      color: 'rgba(0,0,255,.5)',
      showAlpha: true,
      preferredFormat: 'rgb',
      showInput: true,
      change: update_display
    });

    update_display();
  })(jQuery);
</script>
