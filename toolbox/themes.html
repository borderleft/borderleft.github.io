layout: tool
title: "Switch color schemes (vanilla js)"
---

<h1>{{ page.title }}</h1>

<ul>
  <li>Light, dark, and auto modes.</li>
  <li>Persists in localStorage.</li>
  <li>Keyboard-accessible radios.</li>
  <li>No external libs.</li>
</ul>

<h2>Demos</h2>

<div class="switch">
  <label>
    <span>Light</span>
    <input type="radio" name="theme" value="light">
  </label>
  <label>
    <span>Dark</span>
    <input type="radio" name="theme" value="dark">
  </label>
  <label>
    <span>Auto</span>
    <input type="radio" name="theme" value="auto">
  </label>
</div>

<p>
  <small id="system"></small>
  <script>
    (function() {
      const theme_el = document.getElementById('system');
      if (!theme_el) return;

      const update_theme = theme =>
        theme_el.textContent = `System setting: ${theme}`;

      const theme_query = window.matchMedia('(prefers-color-scheme: dark)');

      update_theme(theme_query.matches ? 'dark' : 'light');
      theme_query.addEventListener('change', event =>
        update_theme(event.matches ? 'dark' : 'light')
      );
    })();
  </script>
</p>

<script>
  (function() {
    const theme_inputs = ['light', 'dark', 'auto'].map(theme_value =>
      document.querySelector(`[name="theme"][value="${theme_value}"]`)
    );
    if (theme_inputs.some(input => !input)) return;

    const apply_theme = theme_value => {
      localStorage.setItem('color-scheme', theme_value);
      document.documentElement.dataset.theme = theme_value;
    };

    theme_inputs.forEach(input => {
      input.autocomplete = 'off';
      input.addEventListener('change', () => apply_theme(input.value));
    });

    const stored = localStorage.getItem('color-scheme') || 'auto';
    const active = theme_inputs.find(input => input.value === stored) || theme_inputs[2];
    active.checked = true;
    apply_theme(active.value);
  })();
</script>
