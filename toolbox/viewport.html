layout: tool
title: "Viewport size"
---

<h1>{{ page.title }}</h1>

<p><b id="xy">N/A</b></p>

<script>
  (function() {
    function calc() {
      const x = document.documentElement.clientWidth;
      const y = document.documentElement.clientHeight;
      const el = document.getElementById('xy');
      if (el) el.textContent = x + ' \u00D7 ' + y;
    }
    window.addEventListener('resize', calc);
    calc();
  })();
</script>
