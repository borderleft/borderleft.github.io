<h1>{{ page.title }}</h1>

<ul>
  <li>Autoplay every 3s with fade transitions.</li>
  <li>No controls.</li>
  <li>No external libs.</li>
</ul>

<h2>Demos</h2>

<div class="slider">
  <div class="slide" style="background-image: url('https://picsum.photos/id/55/1000/500');"></div>
  <div class="slide" style="background-image: url('https://picsum.photos/id/82/1000/500');"></div>
  <div class="slide" style="background-image: url('https://picsum.photos/id/93/1000/500');"></div>
</div>

<!--
  CSS aspect ratio:
  1. https://stackoverflow.com/a/10441480
  2. https://developer.mozilla.org/en-US/docs/Web/CSS/aspect-ratio
-->

<script>
  (function() {
    const slides = document.querySelectorAll('.slide');
    if (!slides.length) return;

    const duration = 3000;
    let index = 0;
    slides[0].classList.add('show');

    const timer = setInterval(() => {
      if (!document.body.contains(slides[0])) {
        clearInterval(timer);
        return;
      }
      slides[index].classList.remove('show');
      index = (index + 1) % slides.length;
      slides[index].classList.add('show');
    }, duration);
  })();
</script>
